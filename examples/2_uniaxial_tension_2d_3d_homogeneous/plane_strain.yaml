system:
  dimensionality: "3d"
  nx: 128
  ny: 128
  nz: 1
  pixel: 1.0

material:
  E:
    mode: "constant"
    value: 70.0
  nu:
    mode: "constant"
    value: 0.3

loading:
  eps_target: 0.08
  step_size: 1e-4

boundary_conditions:
  driving_component: "xx"
  mixed_tol: 1.0

output:
  directory: "output_plane_strain"
  duplicate_directory_action: "delete"
  checkpoint_interval: "none"
  enable_summary_log: true
  enable_global_log: true
  enable_console: false