seed: 1
simulation_type: "linear_elastic"

system:
  dimensionality: "3d"
  nx: 128
  ny: 128
  nz: 1
  pixel: 1.0

material:
  E:
    mode: "generated"
    parameters:
      mean: 70.0
      std: 5.0
      corr: 10
      clip_min: 50.0
      
  nu:
    mode: "constant"
    value: 0.3

loading:
  eps_target: 0.08
  step_size: 1e-4

boundary_conditions:
  driving_component: "xx"
  mixed_targets:
    yy: 0.0
    zz: 0.0
  mixed_tol: 1.0

output:
  directory: "output_plane_stress_3d"
  duplicate_directory_action: "delete"
  checkpoint_interval: "none"
  vtk_interval: "100"
  enable_summary_log: true
  enable_global_log: true
  enable_console: false